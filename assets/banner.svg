<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 400"><defs><linearGradient id="bg-grad" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0a0e17"/><stop offset="100%" stop-color="#161f33"/></linearGradient><linearGradient id="curve-grad" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="50%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient><filter id="glow" width="140%" height="140%" x="-20%" y="-20%"><feGaussianBlur result="blur" stdDeviation="8"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>@keyframes pulse{0%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes glow-pulse{0%{filter:drop-shadow(0 0 2px #8b5cf6)}50%{filter:drop-shadow(0 0 15px #ec4899)}}.grid-line{stroke:#1e293b;stroke-width:1}.axis{stroke:#475569;stroke-width:2}.frontier-curve{stroke:url(#curve-grad);stroke-width:6;fill:none;stroke-linecap:round;filter:url(#glow);stroke-dasharray:800;animation:dash 15s linear infinite}.node-dot{fill:#fff;stroke:#ec4899;stroke-width:3;transition:all .3s ease}.floating-group{animation:float 6s ease-in-out infinite}.pulse-bg{animation:pulse 4s ease-in-out infinite}</style></defs><rect width="100%" height="100%" fill="url(#bg-grad)"/><circle cx="200" cy="100" r="150" fill="#4f46e5" class="pulse-bg" filter="url(#glow)" opacity=".15"/><circle cx="1000" cy="300" r="200" fill="#ec4899" class="pulse-bg" filter="url(#glow)" opacity=".1" style="animation-delay:-2s"/><g opacity=".3"><line x1="100" x2="100" y1="50" y2="350" class="grid-line"/><line x1="200" x2="200" y1="50" y2="350" class="grid-line"/><line x1="300" x2="300" y1="50" y2="350" class="grid-line"/><line x1="400" x2="400" y1="50" y2="350" class="grid-line"/><line x1="500" x2="500" y1="50" y2="350" class="grid-line"/><line x1="600" x2="600" y1="50" y2="350" class="grid-line"/><line x1="700" x2="700" y1="50" y2="350" class="grid-line"/><line x1="800" x2="800" y1="50" y2="350" class="grid-line"/><line x1="900" x2="900" y1="50" y2="350" class="grid-line"/><line x1="1000" x2="1000" y1="50" y2="350" class="grid-line"/><line x1="1100" x2="1100" y1="50" y2="350" class="grid-line"/><line x1="50" x2="1150" y1="100" y2="100" class="grid-line"/><line x1="50" x2="1150" y1="150" y2="150" class="grid-line"/><line x1="50" x2="1150" y1="200" y2="200" class="grid-line"/><line x1="50" x2="1150" y1="250" y2="250" class="grid-line"/><line x1="50" x2="1150" y1="300" y2="300" class="grid-line"/></g><line x1="100" x2="100" y1="50" y2="350" class="axis"/><line x1="100" x2="1150" y1="350" y2="350" class="axis"/><text x="1120" y="380" fill="#94a3b8" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="end">OBJECTIVE A (e.g., Efficiency)</text><text x="80" y="70" fill="#94a3b8" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="end" transform="rotate(-90 80 70)">OBJECTIVE B (e.g., Performance)</text><g class="floating-group"><path fill="url(#curve-grad)" d="M 150 120 Q 300 130 550 200 T 1050 330 L 1050 350 L 150 350 Z" opacity=".05"/><path d="M 150 120 Q 300 130 550 200 T 1050 330" class="frontier-curve"/><circle cx="150" cy="120" r="9" class="node-dot" style="animation:glow-pulse 3s infinite"/><circle cx="330" cy="135" r="9" class="node-dot" style="animation:glow-pulse 3s infinite;animation-delay:-.5s"/><circle cx="550" cy="200" r="9" class="node-dot" style="animation:glow-pulse 3s infinite;animation-delay:-1s"/><circle cx="780" cy="265" r="9" class="node-dot" style="animation:glow-pulse 3s infinite;animation-delay:-1.5s"/><circle cx="1050" cy="330" r="9" class="node-dot" style="animation:glow-pulse 3s infinite;animation-delay:-2s"/><circle cx="280" cy="220" r="6" fill="#475569" opacity=".6"/><circle cx="480" cy="280" r="6" fill="#475569" opacity=".6"/><circle cx="700" cy="310" r="6" fill="#475569" opacity=".6"/><circle cx="920" cy="340" r="6" fill="#475569" opacity=".6"/></g><text x="600" y="90" fill="#fff" font-family="'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="900" letter-spacing="3" text-anchor="middle" style="filter:drop-shadow(0 2px 10px rgba(0,0,0,.5))">AWESOME PARETO OPTIMALITY</text><text x="600" y="130" fill="#a5b4fc" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" letter-spacing="1.5" text-anchor="middle">Multi-Objective Optimization, Pareto Frontiers, and AI Alignment</text></svg>